<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f9cc4">
  <title>Rehab — Gestionale</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f9cc4'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>R</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- LOGIN -->
  <div id="login">
    <form class="login-card" id="loginForm">
      <div class="brand-logo">R</div>
      <h1>Rehab</h1>
      <p>Gestionale Studio di Chinesiologia</p>
      <label class="field" style="text-align:left">
        <span>Password</span>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </label>
      <div id="loginError" class="muted" style="color:var(--red);font-size:13px;margin-bottom:10px;"></div>
      <button class="btn" type="submit" style="width:100%">Entra</button>
    </form>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="mini">R</div>
        <div><b>Rehab</b><small>Chinesiologia</small></div>
      </div>
      <nav class="nav" id="nav">
        <button data-view="dashboard" class="active"><span class="ic">■</span><span class="lbl">Dashboard</span></button>
        <button data-view="agenda"><span class="ic">▤</span><span class="lbl">Agenda</span></button>
        <button data-view="pazienti"><span class="ic">☺</span><span class="lbl">Pazienti</span></button>
        <button data-view="contabilita"><span class="ic">€</span><span class="lbl">Contabilità</span></button>
        <button data-view="ricevute"><span class="ic">⎙</span><span class="lbl">Ricevute</span></button>
        <button data-view="report"><span class="ic">▦</span><span class="lbl">Report</span></button>
        <button data-view="impostazioni"><span class="ic">⚙</span><span class="lbl">Impostazioni</span></button>
      </nav>
      <div class="foot">
        <nav class="nav"><button id="logoutBtn"><span class="ic">⏻</span><span class="lbl">Esci</span></button></nav>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
